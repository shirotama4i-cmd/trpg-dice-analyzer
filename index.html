<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <title>ココフォリア・ダイスログ分析ツール</title>
    <style>
        body {
            font-family: 'Helvetica Neue', Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }
        h1 {
            text-align: center;
            color: #2c3e50;
        }
        .drop-zone {
            border: 3px dashed #bdc3c7;
            border-radius: 10px;
            padding: 40px;
            text-align: center;
            background-color: #fff;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        .drop-zone.dragover {
            border-color: #3498db;
            background-color: #ecf0f1;
        }
        #output {
            margin-top: 30px;
            padding: 20px;
            background-color: #fff;
            border-radius: 8px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            white-space: pre-wrap;
            font-family: 'Courier New', Courier, monospace;
            display: none;
        }
        .file-info {
            margin-top: 10px;
            font-weight: bold;
            color: #27ae60;
        }
    </style>
</head>
<body>

    <h1>🎲 ココフォリア・ダイスログ分析ツール</h1>
    
    <div class="drop-zone" id="dropZone">
        ここにココフォリアのログファイル（HTML）をドラッグ＆ドロップするか、<br>
        ここをクリックしてファイルを選択してください。
        <input type="file" id="fileInput" accept=".html" style="display: none;">
        <div class="file-info" id="fileInfo"></div>
    </div>

    <div id="output"></div>

    <script>
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        const output = document.getElementById('output');
        const fileInfo = document.getElementById('fileInfo');

        dropZone.addEventListener('click', () => fileInput.click());

        dropZone.addEventListener('dragover', (e) => {
            e.preventDefault();
            dropZone.classList.add('dragover');
        });

        dropZone.addEventListener('dragleave', () => {
            dropZone.classList.remove('dragover');
        });

        dropZone.addEventListener('drop', (e) => {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            const file = e.dataTransfer.files[0];
            if (file) handleFile(file);
        });

        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (file) handleFile(file);
        });

        function handleFile(file) {
            fileInfo.textContent = `読み込み中: ${file.name}`;
            const reader = new FileReader();
            reader.onload = function(e) {
                analyzeLog(e.target.result);
            };
            reader.readAsText(file, 'UTF-8');
        }

        // ★ 汎用的な名前名寄せ（グループ化）ロジック
        function groupByFlexibleName(rawRecords) {
            // ログに登場するユニークな名前のリストを作成（文字数の長い順にソート）
            // 長い名前（例: VAL-SH411 (シャル)）を基準（代表名）にしやすくるため
            const uniqueNames = Array.from(new Set(rawRecords.map(r => r.rawName)))
                                     .filter(name => name.length > 0)
                                     .sort((a, b) => b.length - a.length);

            // 各名前がどの「代表名」に紐づくかのマッピング辞書
            const nameMapping = {};

            uniqueNames.forEach(name => {
                // すでにマッピングが確定している場合はスキップ
                if (nameMapping[name]) return;

                // 自分より文字数が同じか短い他の名前の中で、部分一致するものがないか探す
                // 例: 「VAL-SH411 (シャル)」のループのとき、リスト内にある「VAL-SH411」を見つけ出す
                const targetGroup = uniqueNames.filter(otherName => {
                    return name.includes(otherName) || otherName.includes(name);
                });

                // 見つかったグループ（ズレのある名前たち）は、一番長い名前（情報量が多い名前）に統一する
                const representativeName = targetGroup[0]; // ソート済みなので0番目が最長
                targetGroup.forEach(gName => {
                    nameMapping[gName] = representativeName;
                });
            });

            // マッピングを元に、データを再グループ化する
            const charMap = {};
            rawRecords.forEach(r => {
                const unifiedName = nameMapping[r.rawName] || r.rawName;
                if (!charMap[unifiedName]) charMap[unifiedName] = [];
                charMap[unifiedName].push(r);
            });

            return charMap;
        }

        function analyzeLog(htmlText) {
            const parser = new DOMParser();
            const doc = parser.parseFromString(htmlText, 'text/html');
            const pTags = doc.querySelectorAll('p');
            
            const rawRecords = [];
            
            pTags.forEach(p => {
                const spans = p.querySelectorAll('span');
                if (spans.length < 3) return;
                
                const channel = spans[0].textContent.trim();
                const rawName = spans[1].textContent.trim();
                const content = spans[2].textContent.trim();
                
                if (content.includes('＞')) {
                    const parts = content.split('＞').map(x => x.trim());
                    const diceExpr = parts[0];
                    const diceValueStr = parts[1] || "";
                    const diceResult = parts[2] || "通常ロール";
                    
                    const matchVal = diceValueStr.match(/\d+/);
                    if (!matchVal) return;
                    const diceValue = parseInt(matchVal[0], 10);
                    
                    const is1d100 = diceExpr.toUpperCase().includes('1D100') || diceExpr.toUpperCase().includes('CCB');
                    const skillMatch = diceExpr.match(/【(.*?)】/);
                    const skillName = skillMatch ? skillMatch[1] : "素振り/その他";
                    
                    rawRecords.push({
                        channel, rawName, diceExpr, skillName, diceValue, diceResult, is1d100
                    });
                }
            });

            if (rawRecords.length === 0) {
                output.style.display = 'block';
                output.textContent = "ダイスログが検出されませんでした。";
                return;
            }

            // 汎用ロジックでグループ化を実行
            const charMap = groupByFlexibleName(rawRecords);
            generateReport(charMap, rawRecords.length);
        }

        function generateReport(charMap, totalCount) {
            let report = "==================================================\n";
            report += "       ココフォリア・ダイスログ分析レポート       \n";
            report += "==================================================\n\n";
            report += `総ダイスロール回数: ${totalCount} 回\n`;

            const RESULT_ORDER = [
                "クリティカル", "決定的成功", "イクストリーム成功", "ハード成功", 
                "スペシャル", "成功", "失敗", "致命的失敗", "ファンブル"
            ];

            Object.keys(charMap).forEach(char => {
                if (!char) return;
                const charList = charMap[char];
                
                report += `\n### キャラクター: ${char} ###\n`;
                report += `  - 総ダイス数: ${charList.length} 回\n`;

                const d100List = charList.filter(r => r.is1d100);
                if (d100List.length > 0) {
                    const sum = d100List.reduce((acc, r) => acc + r.diceValue, 0);
                    const avg = sum / d100List.length;
                    report += `  - 1D100 平均出目: ${avg.toFixed(2)} (低いほど出目が良い)\n`;

                    const resultsCount = {};
                    d100List.forEach(r => {
                        resultsCount[r.diceResult] = (resultsCount[r.diceResult] || 0) + 1;
                    });

                    report += "  - 判定内訳 (固定順):\n";
                    const printedResults = new Set();

                    RESULT_ORDER.forEach(resName => {
                        Object.keys(resultsCount).forEach(k => {
                            if (k.includes(resName) && !printedResults.has(k)) {
                                const count = resultsCount[k];
                                const pct = (count / d100List.length) * 100;
                                report += `    * ${k}: ${count}回 (${pct.toFixed(1)}%)\n`;
                                printedResults.add(k);
                            }
                        });
                    });

                    Object.keys(resultsCount).forEach(k => {
                        if (!printedResults.has(k)) {
                            const count = resultsCount[k];
                            const pct = (count / d100List.length) * 100;
                            report += `    * ${k}: ${count}回 (${pct.toFixed(1)}%)\n`;
                        }
                    });

                    const dramaticMoments = d100List.filter(r => 
                        /クリティカル|決定的成功|ファンブル|致命的失敗/.test(r.diceResult)
                    );

                    if (dramaticMoments.length > 0) {
                        report += "  - 特筆すべき劇的瞬間:\n";
                        dramaticMoments.forEach(r => {
                            report += `    * [${r.skillName}] 出目:${r.diceValue} ＞ ${r.diceResult}\n`;
                        });
                    }
                } else {
                    report += "  - 1D100判定のログはありません(ダメージダイス等のみ)\n";
                }

                const skillCount = {};
                charList.forEach(r => {
                    skillCount[r.skillName] = (skillCount[r.skillName] || 0) + 1;
                });
                const sortedSkills = Object.entries(skillCount).sort((a, b) => b[1] - a[1]).slice(0, 3);
                
                report += "  - よく使用した技能/項目トップ3:\n";
                sortedSkills.forEach(([sName, count]) => {
                    report += `    * ${sName}: ${count}回\n`;
                });
            });

            output.style.display = 'block';
            output.textContent = report;
            fileInfo.textContent = "解析が完了しました！";
        }
    </script>
</body>
</html>
